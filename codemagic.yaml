workflows:
  android-debug:
    name: GG Gaming Mapper — Debug APK
    max_build_duration: 60
    environment:
      java: 11

    scripts:
      - name: Compilar APK Debug
        script: |
          gradle assembleDebug --stacktrace
          echo "=== Buscando APK ==="
          find . -name "*.apk" -type f

    artifacts:
      - "**/*.apk"

    publishing:
      email:
        recipients:
          - tu@email.com
        notify:
          success: true
          failure: true